name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -e ".[dev]"
      - run: ruff check cortex/sdk/ tests/sdk/ tests/e2e/ scenarios/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -e ".[dev,cpu,sdk]" --extra-index-url https://download.pytorch.org/whl/cpu
      - name: Run SDK unit tests
        run: python -m pytest tests/sdk/ -v
      - name: Run core + broker unit tests
        run: python -m pytest tests/unit/core/ tests/unit/broker/ -v

  e2e-mocked:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install base deps (no ML framework)
        run: pip install -e ".[dev,cpu]" --extra-index-url https://download.pytorch.org/whl/cpu
      - name: Run mocked fabric e2e tests
        run: python -m pytest tests/e2e/test_mocked_embedder_e2e.py -v

