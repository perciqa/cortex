name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -e ".[dev]"
      - run: ruff check cortex/ tests/ scenarios/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -e ".[dev,cpu]" --extra-index-url https://download.pytorch.org/whl/cpu
      - name: Run SDK unit tests
        run: python -m pytest tests/sdk/ -v --timeout=60
      - name: Run core tests
        run: python -m pytest tests/core/ -v --timeout=60
