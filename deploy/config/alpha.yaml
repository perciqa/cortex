node:
  org_did: did:percq:org:soc-alpha
  agent_did: did:percq:agent:alpha-bot-1
  key_paths:
    org: /app/config/keys/org_ed25519.pem
    agent: /app/config/keys/agent_ed25519.pem
broker:
  url: ws://broker:7432
  registry: /app/registry/org_registry.json
  replay_window_sec: 600
embedder:
  model: BAAI/bge-small-en-v1.5
  backend: cpu
  batch_size: 4
  fallback_on_oom: true
vector_index:
  backend: hnswlib
  metric: cosine
trust:
  default_org_reputation: 0.85
  half_life_days: 90
  min_trust_default: 0.3
query:
  default_top_k: 5
  deadline_ms: 4000
  min_trust: 0.0
logging:
  level: INFO
  file: /app/config/n.log
