version: "3.9"

services:
  broker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "7432:7432"
    volumes:
      - ./registry:/app/registry
      - ./logs:/app/logs
    environment:
      - CORTEX_LOG_LEVEL=INFO
    command: ["python", "-m", "cortex.broker.server", "--host", "0.0.0.0", "--port", "7432", "--registry", "/app/registry/org_registry.json"]

  node-alpha:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    depends_on:
      - broker
    volumes:
      - ./config/alpha:/app/config
      - ./data/alpha:/app/data
      - ./registry:/app/registry:ro
    environment:
      - CORTEX_BROKER_URL=ws://broker:7432
      - CORTEX_LOG_LEVEL=INFO
    command: ["python", "-m", "cortex.cli", "start", "--config", "/app/config/alpha.yaml"]

  node-beta:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    depends_on:
      - broker
    volumes:
      - ./config/beta:/app/config
      - ./data/beta:/app/data
      - ./registry:/app/registry:ro
    environment:
      - CORTEX_BROKER_URL=ws://broker:7432
      - CORTEX_LOG_LEVEL=INFO
    command: ["python", "-m", "cortex.cli", "start", "--config", "/app/config/beta.yaml"]
